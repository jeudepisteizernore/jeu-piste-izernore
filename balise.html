<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Balise</title>
<link rel="stylesheet" href="style.css">
<script src="game.js" defer></script>
</head>

<body class="romanPage">
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="badge" id="badge">🏛</div>
      <div>
        <h1 id="title">Balise</h1>
        <div class="subtitle" id="subtitle"></div>
      </div>
    </div>
  </div>

  <div class="romanFrame" id="card">
    <div class="romanHeader">
      <div class="romanTag">⚔ Mission</div>
      <div class="romanTag">📍 Izernore</div>
    </div>

    <div class="romanBody">

      <!-- TIMER -->
      <div id="timerBox" style="display:none;margin-bottom:12px"></div>

      <!-- PHOTO -->
      <div class="photoCard" id="photoWrap" style="display:none">
        <img id="photo" alt="Photo balise">
      </div>

      <div class="storyCard" id="story"></div>
      <div class="storyCard" style="margin-top:12px" id="questionTitle"></div>

      <div id="gameZone"></div>

      <div class="actionsRow">
        <div class="btnGhost" id="btnInfo">📖 Infos Izernore</div>
        <div class="btnGhost" id="btnHint">💡 Indice</div>
        <a class="btnGhost" href="index.html">🏛️ Retour</a>
      </div>

      <div class="resultBox">
        <div id="res" style="font-weight:900"></div>
        <div class="smallPro" id="hintsBox" style="margin-top:8px"></div>
      </div>

    </div>
  </div>

</div>

<!-- MODALE INFOS -->
<div class="modalBg" id="infoBg" onclick="closeInfo()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modalTop">
      <div class="romanTag" id="infoTitle">📖 Infos Izernore</div>
      <button class="modalClose" onclick="closeInfo()">✕ Fermer</button>
    </div>
    <div class="modalBody" id="infoBody"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= CONFIG ================= */

const BALISES = {

1:{
icon:"🦉",
title:"Balise I — Avant Rome",
subtitle:"Les peuples gaulois",
photo:"images/b1.jpg",
story:"Avant l’arrivée des Romains, la région était déjà habitée.",
q:"Le territoire appartenait à quel peuple gaulois ?",
type:"mcq",
choices:[
["a","Les Séquanes"],
["b","Les Vikings"],
["c","Les Égyptiens"]
],
answer:"a",
reward:"I",
timer:60,
hints:[
"Peuple gaulois de l’est de la Gaule.",
"Ils vivaient vers la Franche-Comté actuelle."
],
infoTitle:"Avant la conquête",
infoBody:`
<p>Avant l’arrivée des Romains au Ier siècle avant J.-C., la région était occupée par un peuple gaulois : les Séquanes.</p>
<p>Ils commerçaient, fabriquaient des objets en métal et vivaient dans des villages organisés.</p>
<p>Des fouilles ont retrouvé des monnaies, des poteries et des objets datant de cette époque.</p>
`
},

2:{
icon:"🏛",
title:"Balise II — Le Vicus",
subtitle:"Une petite ville gallo-romaine",
photo:"images/b2.jpg",
story:"Après la conquête, une petite ville se développe.",
q:"Comment appelle-t-on une petite ville romaine rurale ?",
type:"mcq",
choices:[
["a","Un vicus"],
["b","Un château"],
["c","Une pyramide"]
],
answer:"a",
reward:"S",
hints:["Mot latin utilisé en Gaule romaine."],
infoTitle:"Le Vicus",
infoBody:`
<p>Un vicus est une petite ville gallo-romaine.</p>
<p>On y trouvait des maisons, des boutiques et des ateliers.</p>
<p>Les habitants y vivaient du commerce et de l’artisanat.</p>
`
},

3:{
icon:"🔥",
title:"Balise III — Les Thermes",
subtitle:"Les bains romains",
photo:"images/b3.jpg",
story:"Les Romains adoraient se laver dans des bains publics.",
q:"Dans quelle salle l’eau est-elle chaude ?",
type:"mcq",
choices:[
["a","Caldarium"],
["b","Frigidarium"],
["c","Atrium"]
],
answer:"a",
reward:"A",
hints:["Calda signifie chaud."],
infoTitle:"Les Thermes",
infoBody:`
<p>Les thermes étaient des bains publics.</p>
<p>Ils comportaient plusieurs salles :</p>
<ul>
<li>Caldarium : salle chaude</li>
<li>Tepidarium : salle tiède</li>
<li>Frigidarium : salle froide</li>
</ul>
<p>Ce n’était pas seulement pour se laver, mais aussi pour discuter et se détendre.</p>
`
},

4:{
icon:"🧱",
title:"Balise IV — Hypocauste",
subtitle:"Le chauffage romain",
photo:"images/b4.jpg",
story:"Les Romains avaient un système ingénieux.",
q:"L’hypocauste chauffe principalement…",
type:"mcq",
choices:[
["a","Le sol par en dessous"],
["b","Les toits"],
["c","L’extérieur"]
],
answer:"a",
reward:"R",
hints:["HYPO = dessous."],
infoTitle:"L’Hypocauste",
infoBody:`
<p>L’hypocauste est un système de chauffage antique.</p>
<p>Un foyer produisait de l’air chaud qui circulait sous le sol.</p>
<p>La chaleur montait ensuite dans les murs.</p>
<p>C’était très avancé pour l’époque.</p>
`
},

5:{
icon:"🛍",
title:"Balise V — Le Commerce",
subtitle:"Vie quotidienne",
photo:"images/b5.jpg",
story:"La ville antique était animée.",
q:"Que trouvait-on le long de la voie principale ?",
type:"mcq",
choices:[
["a","Des boutiques"],
["b","Des pistes d’atterrissage"],
["c","Des autoroutes"]
],
answer:"a",
reward:"N",
hints:["On vendait et fabriquait des objets."],
infoTitle:"Le Commerce",
infoBody:`
<p>Les maisons et boutiques étaient installées le long d’une voie.</p>
<p>On y vendait des poteries, des outils, des vêtements.</p>
<p>Des artisans travaillaient le métal et la céramique.</p>
`
},

6:{
icon:"🏺",
title:"Balise VI — La Villa",
subtitle:"Habitation riche",
photo:"images/b6.jpg",
story:"Certaines familles vivaient dans de grandes villas.",
q:"Quel élément montre le luxe ?",
type:"mcq",
choices:[
["a","Peintures murales"],
["b","Garage à dragons"],
["c","Ascenseur électrique"]
],
answer:"a",
reward:"O",
hints:["Influence italienne."],
infoTitle:"La Villa",
infoBody:`
<p>Une grande villa découverte dans la région montre un haut niveau de vie.</p>
<p>On y a retrouvé des peintures murales importées d’Italie.</p>
<p>Il existait aussi une galerie à colonnes avec vue sur la vallée.</p>
`
},

7:{
icon:"🏛",
title:"Balise VII — Le Temple",
subtitle:"Monument antique",
photo:"images/b7.jpg",
story:"Un grand temple dominait le paysage.",
q:"Quelle est la hauteur approximative des piliers conservés ?",
type:"mcq",
choices:[
["a","9 mètres"],
["b","2 mètres"],
["c","30 mètres"]
],
answer:"a",
reward:"D",
hints:["Très impressionnant."],
infoTitle:"Le Temple",
infoBody:`
<p>Le temple gallo-romain est un monument impressionnant.</p>
<p>Trois piliers d’angle sont encore visibles aujourd’hui.</p>
<p>Ils mesurent environ 9 mètres de haut.</p>
<p>Le monument est classé monument historique depuis 1840.</p>
`
},

8:{
icon:"⚔",
title:"Balise VIII — Le Dieu",
subtitle:"Mystère antique",
photo:"images/b8.jpg",
story:"On ne sait pas exactement quel dieu était honoré.",
q:"Quel dieu pourrait être lié au nom d’un chemin local ?",
type:"mcq",
choices:[
["a","Mars"],
["b","Neptune"],
["c","Apollon"]
],
answer:"a",
reward:"O",
hints:["Regarde le nom du chemin."],
infoTitle:"Le Dieu",
infoBody:`
<p>Les archéologues pensent que le temple pouvait être dédié à un dieu romain.</p>
<p>Une inscription évoque Mercure.</p>
<p>Mais un ancien chemin nommé « vi de mars » fait penser au dieu Mars.</p>
`
},

9:{
icon:"🪨",
title:"Balise IX — Les Pierres",
subtitle:"Mémoire du village",
photo:"images/b9.jpg",
story:"Les pierres racontent l’histoire.",
q:"La pierre mouillée correspond à…",
type:"mcq",
choices:[
["a","Un lavoir"],
["b","Un temple"],
["c","Une école"]
],
answer:"a",
reward:"R",
hints:["L’eau…"],
infoTitle:"Chemin des pierres",
infoBody:`
<p>Le parcours du « chemin des pierres » explique différents lieux du village.</p>
<p>La pierre mouillée correspond au lavoir.</p>
<p>La pierre sacrée à l’église.</p>
<p>La pierre ruinée au temple antique.</p>
`
},

10:{
icon:"👑",
title:"Balise X — Protection",
subtitle:"Monument historique",
photo:"images/b10.jpg",
story:"Un monument est protégé depuis longtemps.",
q:"Depuis quelle année le temple est-il classé ?",
type:"mcq",
choices:[
["a","1840"],
["b","1999"],
["c","2020"]
],
answer:"a",
reward:"U",
hints:["Première grande liste nationale."],
infoTitle:"Classement",
infoBody:`
<p>Le temple fait partie de la première liste des monuments historiques protégés en France.</p>
<p>Ce classement date de 1840.</p>
`
},

11:{
icon:"🏁",
title:"Balise XI — Final",
subtitle:"Mot secret",
photo:"images/b11.jpg",
story:"Assemble toutes les lettres obtenues.",
q:"Entre le mot secret :",
type:"final",
reward:"",
hints:["Tu as 10 lettres."],
infoTitle:"Fin",
infoBody:`<p>Bravo pour ton parcours historique !</p>`
}

};

/* ================= RENDER ================= */

const params = new URLSearchParams(location.search);
const b = parseInt(params.get("b")||"1",10);
const data = BALISES[b];

if(!data){ document.body.innerHTML="Balise introuvable."; return; }

$("badge").textContent = data.icon;
$("title").textContent = data.title;
$("subtitle").textContent = data.subtitle;
$("story").innerHTML = data.story;
$("questionTitle").innerHTML = "<b>"+data.q+"</b>";

/* ===== TIMER ===== */
let timerInterval=null;
if(data.timer){
  let t=data.timer;
  $("timerBox").style.display="block";
  $("timerBox").innerHTML=`<div class="romanTag">⏳ Temps : <span id="t">${t}</span>s</div>`;
  timerInterval=setInterval(()=>{
    t--;
    $("t").textContent=t;
    if(t<=0){ clearInterval(timerInterval); fail("⏳ Temps écoulé !"); }
  },1000);
}

/* ===== PHOTO immersive ===== */
if(data.photo){
  $("photoWrap").style.display="flex";
  const img=$("photo");
  img.src=data.photo;
  img.onload=()=>{
    $("photoWrap").style.setProperty("--photo-bg",`url('${data.photo}')`);
    const portrait = img.naturalHeight>img.naturalWidth;
    $("photoWrap").classList.toggle("isPortrait",portrait);
    $("photoWrap").classList.toggle("isLandscape",!portrait);
  };
}

/* ===== Infos ===== */
$("infoTitle").textContent="📖 "+data.infoTitle;
$("infoBody").innerHTML=data.infoBody;
$("btnInfo").onclick=()=>{ play("click"); $("infoBg").style.display="flex"; };

$("btnHint").onclick=()=>{
  play("click");
  $("hintsBox").innerHTML=data.hints.map(h=>"• "+h).join("<br>");
};

renderGame(data);

/* ================= GAMES ================= */

function renderGame(d){
  const z=$("gameZone");
  z.innerHTML="";

  if(d.type==="mcq"){
    d.choices.forEach(([id,label])=>{
      const btn=document.createElement("button");
      btn.className="choiceBtn";
      btn.textContent=label;
      btn.onclick=()=> id===d.answer ? win(d.reward) : fail();
      z.appendChild(btn);
    });
  }

  if(d.type==="caesar"){
    z.innerHTML+=`
      <div class="storyCard">
        <b>${d.cipher}</b>
      </div>`;
    const input=document.createElement("input");
    input.placeholder="Message décrypté...";
    input.style.marginTop="12px";
    z.appendChild(input);

    const btn=document.createElement("div");
    btn.className="btnGhost";
    btn.style.display="inline-flex";
    btn.style.marginTop="12px";
    btn.textContent="Valider";
    btn.onclick=()=>{
      const ok=input.value.toUpperCase().trim()===d.answerText;
      ok?win(d.reward):fail("❌ Mauvais décryptage.");
    };
    z.appendChild(btn);
  }

  if(d.type==="tiles"){
    const selected=new Set();
    d.tiles.forEach(([id,label])=>{
      const tile=document.createElement("button");
      tile.className="choiceBtn";
      tile.textContent=label;
      tile.onclick=()=>{
        selected.has(id)?selected.delete(id):selected.add(id);
        tile.classList.toggle("glow");
      };
      z.appendChild(tile);
    });

    const btn=document.createElement("div");
    btn.className="btnGhost";
    btn.style.display="inline-flex";
    btn.style.marginTop="12px";
    btn.textContent="Valider";
    btn.onclick=()=>{
      const correct=d.tiles.filter(t=>t[2]).map(t=>t[0]);
      const ok=correct.length===selected.size && correct.every(x=>selected.has(x));
      ok?win(d.reward):fail();
    };
    z.appendChild(btn);
  }

  if(d.type==="final"){
    const input=document.createElement("input");
    input.placeholder="MOT SECRET";
    input.style.textTransform="uppercase";
    z.appendChild(input);

    const btn=document.createElement("div");
    btn.className="btnGhost";
    btn.style.display="inline-flex";
    btn.style.marginTop="12px";
    btn.textContent="Valider";
    btn.onclick=()=>{
      if(input.value.toUpperCase()==="ISARNODORUM"){
        setDone(11);
        glow($("card"));
        $("res").textContent="🏛️🎉 Mission réussie !";
      }else{
        fail();
      }
    };
    z.appendChild(btn);
  }
}

/* ===== helpers ===== */
function win(letter){
  if(timerInterval) clearInterval(timerInterval);
  setDone(b);
  glow($("card"));
  $("res").innerHTML="✅ Lettre gagnée : <span class='letter'>"+letter+"</span>";
}

function fail(msg){
  shake($("card"));
  $("res").textContent=msg||"❌ Mauvaise réponse.";
}

});

function closeInfo(){ document.getElementById("infoBg").style.display="none"; }
</script>
</body>
</html>
