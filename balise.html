<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Balise</title>
<link rel="stylesheet" href="style.css">
<script src="game.js" defer></script>
</head>

<body class="romanPage">
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="badge" id="badge">🏛</div>
      <div>
        <h1 id="title">Balise</h1>
        <div class="subtitle" id="subtitle"></div>
      </div>
    </div>
  </div>

  <div class="romanFrame" id="card">
    <div class="romanHeader">
      <div class="romanTag">⚔ Mission</div>
      <div class="romanTag">📍 Izernore</div>
    </div>

    <div class="romanBody">

      <!-- TIMER -->
      <div id="timerBox" style="display:none;margin-bottom:12px"></div>

      <!-- PHOTO -->
      <div class="photoCard" id="photoWrap" style="display:none">
        <img id="photo" alt="Photo balise">
      </div>

      <div class="storyCard" id="story"></div>
      <div class="storyCard" style="margin-top:12px" id="questionTitle"></div>

      <div id="gameZone"></div>

      <div class="actionsRow">
        <div class="btnGhost" id="btnInfo">📖 Infos Izernore</div>
        <div class="btnGhost" id="btnHint">💡 Indice</div>
        <a class="btnGhost" href="index.html">🏛️ Retour</a>
      </div>

      <div class="resultBox">
        <div id="res" style="font-weight:900"></div>
        <div class="smallPro" id="hintsBox" style="margin-top:8px"></div>
      </div>

    </div>
  </div>

</div>

<!-- MODALE INFOS -->
<div class="modalBg" id="infoBg" onclick="closeInfo()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modalTop">
      <div class="romanTag" id="infoTitle">📖 Infos Izernore</div>
      <button class="modalClose" onclick="closeInfo()">✕ Fermer</button>
    </div>
    <div class="modalBody" id="infoBody"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* ================= CONFIG ================= */

const BALISES = {
  1:{
    icon:"🦉",
    title:"Balise I — Avant Rome",
    subtitle:"Les Séquanes",
    photo:"images/b1.jpg",
    story:"Un ancien raconte : prouve que tu connais le peuple gaulois local.",
    q:"Isarnodurum était au sud du territoire…",
    type:"mcq",
    choices:[
      ["a","des Séquanes"],
      ["b","des Vikings"],
      ["c","des Pharaons"]
    ],
    answer:"a",
    reward:"IS",
    timer:60,
    hints:["Peuple gaulois régional.","Indice : S…"],
    infoTitle:"Avant Rome",
    infoBody:"<p>Izernore existait avant Rome. Le territoire appartenait aux Séquanes.</p>"
  },

  /* ===== Exemple César ===== */
  2:{
    icon:"🛡️",
    title:"Balise II — Message Secret",
    subtitle:"Code César",
    photo:"images/b2.jpg",
    story:"Décrypte le message du légionnaire.",
    q:"Décale chaque lettre de 3 vers l’arrière",
    type:"caesar",
    cipher:"LQIRV LCHUQRUH",
    shift:3,
    answerText:"INFOS IZERNORE",
    reward:"A",
    hints:["A devient X si on recule de 3."],
    infoTitle:"Code César",
    infoBody:"<p>Le code César est un décalage simple de lettres.</p>"
  },

  /* ===== Exemple Tuiles ===== */
  3:{
    icon:"🧩",
    title:"Balise III — Puzzle",
    subtitle:"Choisis les bonnes tuiles",
    photo:"images/b3.jpg",
    story:"Sélectionne les éléments réels d’une villa romaine.",
    q:"Clique les bonnes réponses",
    type:"tiles",
    tiles:[
      ["a","Peintures murales",true],
      ["b","Galerie à colonnes",true],
      ["c","Garage à dragons",false],
      ["d","Console romaine",false]
    ],
    reward:"R",
    hints:["Il y a 2 bonnes réponses."],
    infoTitle:"Villa",
    infoBody:"<p>Les villas romaines riches avaient peintures et colonnes.</p>"
  },

  11:{
    icon:"🏁",
    title:"Balise XI — Final",
    subtitle:"Entre le mot secret",
    photo:"images/b11.jpg",
    story:"Assemble les lettres.",
    q:"Entre le mot secret",
    type:"final",
    reward:"",
    hints:["Vérifie l’ordre."],
    infoTitle:"Fin",
    infoBody:"<p>Bravo !</p>"
  }
};

/* ================= RENDER ================= */

const params = new URLSearchParams(location.search);
const b = parseInt(params.get("b")||"1",10);
const data = BALISES[b];

if(!data){ document.body.innerHTML="Balise introuvable."; return; }

$("badge").textContent = data.icon;
$("title").textContent = data.title;
$("subtitle").textContent = data.subtitle;
$("story").innerHTML = data.story;
$("questionTitle").innerHTML = "<b>"+data.q+"</b>";

/* ===== TIMER ===== */
let timerInterval=null;
if(data.timer){
  let t=data.timer;
  $("timerBox").style.display="block";
  $("timerBox").innerHTML=`<div class="romanTag">⏳ Temps : <span id="t">${t}</span>s</div>`;
  timerInterval=setInterval(()=>{
    t--;
    $("t").textContent=t;
    if(t<=0){ clearInterval(timerInterval); fail("⏳ Temps écoulé !"); }
  },1000);
}

/* ===== PHOTO immersive ===== */
if(data.photo){
  $("photoWrap").style.display="flex";
  const img=$("photo");
  img.src=data.photo;
  img.onload=()=>{
    $("photoWrap").style.setProperty("--photo-bg",`url('${data.photo}')`);
    const portrait = img.naturalHeight>img.naturalWidth;
    $("photoWrap").classList.toggle("isPortrait",portrait);
    $("photoWrap").classList.toggle("isLandscape",!portrait);
  };
}

/* ===== Infos ===== */
$("infoTitle").textContent="📖 "+data.infoTitle;
$("infoBody").innerHTML=data.infoBody;
$("btnInfo").onclick=()=>{ play("click"); $("infoBg").style.display="flex"; };

$("btnHint").onclick=()=>{
  play("click");
  $("hintsBox").innerHTML=data.hints.map(h=>"• "+h).join("<br>");
};

renderGame(data);

/* ================= GAMES ================= */

function renderGame(d){
  const z=$("gameZone");
  z.innerHTML="";

  if(d.type==="mcq"){
    d.choices.forEach(([id,label])=>{
      const btn=document.createElement("button");
      btn.className="choiceBtn";
      btn.textContent=label;
      btn.onclick=()=> id===d.answer ? win(d.reward) : fail();
      z.appendChild(btn);
    });
  }

  if(d.type==="caesar"){
    z.innerHTML+=`
      <div class="storyCard">
        <b>${d.cipher}</b>
      </div>`;
    const input=document.createElement("input");
    input.placeholder="Message décrypté...";
    input.style.marginTop="12px";
    z.appendChild(input);

    const btn=document.createElement("div");
    btn.className="btnGhost";
    btn.style.display="inline-flex";
    btn.style.marginTop="12px";
    btn.textContent="Valider";
    btn.onclick=()=>{
      const ok=input.value.toUpperCase().trim()===d.answerText;
      ok?win(d.reward):fail("❌ Mauvais décryptage.");
    };
    z.appendChild(btn);
  }

  if(d.type==="tiles"){
    const selected=new Set();
    d.tiles.forEach(([id,label])=>{
      const tile=document.createElement("button");
      tile.className="choiceBtn";
      tile.textContent=label;
      tile.onclick=()=>{
        selected.has(id)?selected.delete(id):selected.add(id);
        tile.classList.toggle("glow");
      };
      z.appendChild(tile);
    });

    const btn=document.createElement("div");
    btn.className="btnGhost";
    btn.style.display="inline-flex";
    btn.style.marginTop="12px";
    btn.textContent="Valider";
    btn.onclick=()=>{
      const correct=d.tiles.filter(t=>t[2]).map(t=>t[0]);
      const ok=correct.length===selected.size && correct.every(x=>selected.has(x));
      ok?win(d.reward):fail();
    };
    z.appendChild(btn);
  }

  if(d.type==="final"){
    const input=document.createElement("input");
    input.placeholder="MOT SECRET";
    input.style.textTransform="uppercase";
    z.appendChild(input);

    const btn=document.createElement("div");
    btn.className="btnGhost";
    btn.style.display="inline-flex";
    btn.style.marginTop="12px";
    btn.textContent="Valider";
    btn.onclick=()=>{
      if(input.value.toUpperCase()==="ISARNODORUM"){
        setDone(11);
        glow($("card"));
        $("res").textContent="🏛️🎉 Mission réussie !";
      }else{
        fail();
      }
    };
    z.appendChild(btn);
  }
}

/* ===== helpers ===== */
function win(letter){
  if(timerInterval) clearInterval(timerInterval);
  setDone(b);
  glow($("card"));
  $("res").innerHTML="✅ Lettre gagnée : <span class='letter'>"+letter+"</span>";
}

function fail(msg){
  shake($("card"));
  $("res").textContent=msg||"❌ Mauvaise réponse.";
}

});

function closeInfo(){ document.getElementById("infoBg").style.display="none"; }
</script>
</body>
</html>
